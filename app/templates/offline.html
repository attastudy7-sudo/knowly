<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're offline – knowly</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/images/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 40px rgba(99,102,241,.12);
            border: 1px solid rgba(99,102,241,.12);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg,#2563eb 0%,#06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        .offline-illustration {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99,102,241,.1), rgba(139,92,246,.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        h1 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.75rem;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 0.75rem;
        }

        p {
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 16px rgba(99,102,241,.35);
            transition: transform .18s, box-shadow .18s;
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(99,102,241,.45);
        }

        .tips {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }
        .tips p {
            font-size: 0.8rem;
            color: #94a3b8;
            margin: 0;
        }

        /* Pulse animation for the illustration */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .offline-illustration { animation: pulse 3s ease-in-out infinite; }

        /* Dark mode */
        [data-theme="dark"] body { background: #0f172a; color: #f1f5f9; }
        [data-theme="dark"] .card { background: #1e293b; border-color: #334155; }
        [data-theme="dark"] h1 { color: #f1f5f9; }
        [data-theme="dark"] p { color: #94a3b8; }
        [data-theme="dark"] .tips { border-top-color: #334155; }
    </style>
    <script>(function(){var t=localStorage.getItem('knowly-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
    <div class="card">
        <div class="brand">
            <img src="static/images/icon-72x72.png">
            knowly
        </div>

        <div class="offline-illustration">
            🌐
        </div>

        <h1>You're offline</h1>
        <p>
            Looks like you've lost your internet connection.
            Connect to Wi-Fi or mobile data to keep studying.
        </p>

        <button class="btn-retry" onclick="window.location.reload()">
            ↻ Try again
        </button>

        <div class="tips">
            <p>Tip: Previously visited pages may still be available from cache.</p>
        </div>
    </div>
</body>
</html>
